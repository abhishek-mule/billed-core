name: Build Custom Frappe Image

on:
  push:
    branches: [main, master]
    paths:
      - 'electrical_trader_pack/**'
      - 'frappe_docker/images/custom/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'electrical_trader_pack/**'
      - 'frappe_docker/images/custom/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{ is_default_branch }}

      - name: Set apps.json
        run: |
          echo '[
            {"url": "https://github.com/frappe/erpnext", "branch": "version-15"},
            {"url": "https://github.com/resilient-tech/india_compliance", "branch": "version-15"},
            {"path": "electrical_trader_pack"}
          ]' > apps.json

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: frappe_docker
          file: frappe_docker/images/custom/Containerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            FRAPPE_BRANCH=version-15
          secrets: |
            apps_json=apps.json
          cache-from: type=gha
          cache-to: type=gha,mode=max