upstream backend {
    server backend:8000;
}

upstream websocket {
    server websocket:9000;
}

# Use default site for localhost/127.0.0.1
map $http_host $frappe_site {
    default $http_host;
    "localhost" client.localhost;
    "127.0.0.1" client.localhost;
    "~^(.+)\.localhost$" $1;
}

server {
    listen 8080;
    listen [::]:8080;

    server_name _;
    client_max_body_size 50m;

    root /home/frappe/frappe-bench/sites;

    location / {
        proxy_pass http://backend;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_set_header X-Frappe-Site-Name $frappe_site;
        proxy_redirect off;
    }

    location /assets/ {
        alias /home/frappe/frappe-bench/sites/assets/;
        expires 30d;
        add_header Cache-Control public;
    }

    location ~ ^/api/(.*) {
        proxy_pass http://backend/$1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_set_header X-Frappe-Site-Name $frappe_site;
    }

    location /socket.io {
        proxy_pass http://websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Frappe-Site-Name $frappe_site;
    }
}