upstream backend {
    server backend:8000;
}

server {
    listen 8080;
    server_name _;
    root /home/frappe/frappe-bench/sites;

    # Serve bundle files from sites/assets root (without /assets/ prefix)
    location ~ ^/([a-zA-Z0-9_-]+\.bundle\.(css|js))$ {
        alias /home/frappe/frappe-bench/sites/assets/$1;
    }

    # Serve all other assets from /assets/
    location /assets/ {
        alias /home/frappe/frappe-bench/sites/assets/;
    }

    location / {
        proxy_pass http://backend;
        proxy_set_header Host erp.example.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}