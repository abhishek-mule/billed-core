<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" fill="none">
  <!-- Icon: Lightning + Receipt -->
  <g transform="translate(8, 16)">
    <!-- Receipt/Document base -->
    <rect x="0" y="4" width="28" height="36" rx="4" fill="#4F46E5"/>
    <!-- Lightning bolt -->
    <path d="M14 2L8 18H16L12 34L20 18H12L14 2Z" fill="#FFFFFF"/>
